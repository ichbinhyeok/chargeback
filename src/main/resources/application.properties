spring.application.name=chargeback
gg.jte.development-mode=true
spring.datasource.url=jdbc:h2:mem:chargeback;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.docker.compose.enabled=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.web.locale=en_US
spring.web.locale-resolver=fixed
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

app.storage.root=${APP_STORAGE_ROOT:./data/evidence}
app.case.max-files=${APP_CASE_MAX_FILES:100}
app.retention.days=${APP_RETENTION_DAYS:30}
app.retention.due-date-buffer-days=${APP_RETENTION_DUE_DATE_BUFFER_DAYS:7}
app.retention.cron=${APP_RETENTION_CRON:0 30 3 * * *}
app.api.enforce-case-token=${APP_API_ENFORCE_CASE_TOKEN:true}
app.trace.header-name=${APP_TRACE_HEADER_NAME:X-Trace-Id}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

app.billing.amount-cents=${APP_BILLING_AMOUNT_CENTS:1900}
app.billing.currency=${APP_BILLING_CURRENCY:usd}
app.billing.success-url-template=${APP_BILLING_SUCCESS_URL_TEMPLATE:http://localhost:8080/c/{caseToken}/export?paid=1}
app.billing.cancel-url-template=${APP_BILLING_CANCEL_URL_TEMPLATE:http://localhost:8080/c/{caseToken}/export?payment=cancelled}
app.billing.provider=${APP_BILLING_PROVIDER:stripe}
app.billing.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.billing.lemonsqueezy.api-key=${LEMONSQUEEZY_API_KEY:}
app.billing.lemonsqueezy.webhook-secret=${LEMONSQUEEZY_WEBHOOK_SECRET:}
app.billing.lemonsqueezy.store-id=${LEMONSQUEEZY_STORE_ID:}
app.billing.lemonsqueezy.variant-id=${LEMONSQUEEZY_VARIANT_ID:}
