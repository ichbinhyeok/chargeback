plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.3'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'gg.jte.gradle' version '3.2.3'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'Chargeback evidence upload recovery and submission-readiness engine'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

ext {
	set('springModulithVersion', "2.0.3")
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-h2console'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-restclient'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	implementation 'gg.jte:jte-spring-boot-starter-4:3.2.3'
	implementation 'io.github.wimdeblauwe:htmx-spring-boot:5.0.0'
	implementation 'org.apache.pdfbox:pdfbox:3.0.2'
	implementation 'org.apache.pdfbox:preflight:3.0.2'
	implementation 'com.twelvemonkeys.imageio:imageio-webp:3.13.0'
	implementation 'org.springframework.modulith:spring-modulith-starter-core'
	implementation 'org.springframework.boot:spring-boot-starter-flyway'
	compileOnly 'org.projectlombok:lombok'
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	developmentOnly 'org.springframework.boot:spring-boot-docker-compose'
	runtimeOnly 'com.h2database:h2'
	runtimeOnly 'org.postgresql:postgresql'
	annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-restclient-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testImplementation 'org.springframework.modulith:spring-modulith-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.modulith:spring-modulith-bom:${springModulithVersion}"
	}
}

jte {
	generate()
	binaryStaticContent = true
}

tasks.named('test') {
	useJUnitPlatform()
	jvmArgs("-XX:+EnableDynamicAgentLoading", "-Xshare:off")
}

tasks.register('verifySummaryPdfRender', JavaExec) {
	group = 'verification'
	description = 'Verifies rendered free summary PDFs and exports the first page as PNG.'
	dependsOn testClasses
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'com.example.demo.dispute.tools.SummaryPdfRenderVerifier'
	if (project.hasProperty('pdfPath')) {
		args "--pdf=" + project.property('pdfPath')
	}
	if (project.hasProperty('pngOutputDir')) {
		args "--outputDir=" + project.property('pngOutputDir')
	}
}

def summaryFixturePdf = layout.buildDirectory.file("tmp/summary-pdf-fixture/summary-fixture.pdf")

tasks.register('generateSummaryPdfFixture', JavaExec) {
	group = 'verification'
	description = 'Generates a deterministic free-summary PDF fixture for visual regression checks.'
	dependsOn testClasses
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'com.example.demo.dispute.tools.SummaryPdfFixtureWriter'
	args "--pdf=" + summaryFixturePdf.get().asFile.absolutePath
}

tasks.register('verifySummaryPdfBaseline', JavaExec) {
	group = 'verification'
	description = 'Renders the deterministic summary fixture and compares it to committed PNG baselines.'
	dependsOn testClasses
	if (!project.hasProperty('pdfPath')) {
		dependsOn tasks.named('generateSummaryPdfFixture')
	}
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'com.example.demo.dispute.tools.SummaryPdfRenderVerifier'
	if (project.hasProperty('pdfPath')) {
		args "--pdf=" + project.property('pdfPath')
	} else {
		args "--pdf=" + summaryFixturePdf.get().asFile.absolutePath
	}
	if (project.hasProperty('pngOutputDir')) {
		args "--outputDir=" + project.property('pngOutputDir')
	} else {
		args "--outputDir=output/pdf/render-checks"
	}
	if (project.hasProperty('baselineDir')) {
		args "--baselineDir=" + project.property('baselineDir')
	} else {
		args "--baselineDir=src/test/resources/pdf-baselines"
	}
	if (project.hasProperty('updateBaselines') && project.property('updateBaselines').toString() == 'true') {
		args "--updateBaselines"
	}
}
